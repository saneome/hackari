<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; -webkit-font-smoothing: antialiased; }
.container { max-width: 520px; margin: 0 auto; padding: 48px 32px; background: #0a0a0a; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; }
.logo { text-align: center; margin-bottom: 40px; }
.logo svg { display: block; margin: 0 auto; }
.logo-text { font-size: 24px; font-weight: 700; letter-spacing: 0.02em; }
.logo-hack { color: #ffffff; }
.logo-ari { color: #D4FF00; }
.logo-cursor { color: #D4FF00; }
.title { font-size: 22px; font-weight: 600; color: #ffffff; text-align: center; margin-bottom: 16px; letter-spacing: -0.01em; }
.subtitle { font-size: 15px; color: rgba(255,255,255,0.55); text-align: center; margin-bottom: 32px; line-height: 1.6; }
.button-wrapper { text-align: center; margin: 32px 0; }
.button { display: inline-block; padding: 14px 28px; background: #D4FF00; color: #0a0a0a; font-size: 14px; font-weight: 600; text-decoration: none; border-radius: 6px; }
.button:hover { background: #e0ff33; }
.link-fallback { background: rgba(212, 255, 0, 0.06); border: 1px solid rgba(212, 255, 0, 0.2); border-radius: 6px; padding: 14px; margin: 16px 0; word-break: break-all; text-align: center; }
.link-fallback a { color: #D4FF00; font-size: 12px; text-decoration: none; font-family: 'SF Mono', 'Courier New', monospace; }
.footer { margin-top: 40px; padding-top: 24px; border-top: 1px solid rgba(255,255,255,0.08); text-align: center; }
.footer-text { font-size: 12px; color: rgba(255,255,255,0.35); line-height: 1.6; }
.footer-text a { color: rgba(255,255,255,0.55); text-decoration: none; }
.highlight { color: #D4FF00; }
.info-box { background: rgba(255,255,255,0.03); border-radius: 8px; padding: 18px; margin: 20px 0; border: 1px solid rgba(255,255,255,0.06); }
.info-item { display: flex; align-items: flex-start; gap: 10px; margin: 10px 0; color: rgba(255,255,255,0.7); font-size: 13px; }
.info-item:first-child { margin-top: 0; }
.info-item:last-child { margin-bottom: 0; }
.info-icon { width: 18px; height: 18px; background: rgba(212, 255, 0, 0.12); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #D4FF00; font-size: 10px; flex-shrink: 0; }
.accent-dot { color: #FF5722; }
</style>
</head>
<body style="background-color: #050505; padding: 32px 16px;">
<div class="container">
<div class="logo">
<table role="presentation" cellpadding="0" cellspacing="0" border="0" align="center">
<tr>
<td style="padding: 0;">
<!--[if mso]>
<v:roundrect xmlns:v="urn:schemas-microsoft-com:vml" xmlns:w="urn:schemas-microsoft-com:office:word" style="height:48px;v-text-anchor:middle;width:48px;" arcsize="17%" fillcolor="#0a0a0a" stroke="f">
<w:anchorlock/>
<center><span style="color:#D4FF00;font-size:24px;font-weight:bold;">&lt;/&gt;</span></center>
</v:roundrect>
<![endif]-->
<!--[if !mso]><!-- -->
<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" style="display: block;">
<rect width="48" height="48" rx="8" fill="#0a0a0a"/>
<path d="M12 18L18 30L24 24L30 30L36 18" stroke="#D4FF00" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
<circle cx="12" cy="18" r="3" fill="#D4FF00"/>
<circle cx="36" cy="18" r="3" fill="#D4FF00"/>
<circle cx="24" cy="24" r="3" fill="#FF5722"/>
</svg>
<!--<![endif]-->
</td>
</tr>
<tr>
<td style="padding: 12px 0 0 0; text-align: center;">
<div class="logo-text"><span class="logo-hack">hack</span><span class="logo-ari">ari</span><span class="logo-cursor">_</span></div>
</td>
</tr>
</table>
</div>
{{{content}}}
</div>
</body>
</html>
