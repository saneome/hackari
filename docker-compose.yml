services:
  postgres:
    image: postgres:16-alpine
    container_name: hackari_postgres
    environment:
      POSTGRES_USER: hackari
      POSTGRES_PASSWORD: hackari_dev
      POSTGRES_DB: hackari
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hackari -d hackari"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: hackari_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@hackari.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  minio:
    image: minio/minio:latest
    container_name: hackari_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  redis:
    image: redis:7-alpine
    container_name: hackari_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hackari_backend
    dns:
      - 8.8.8.8
      - 1.1.1.1
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgres://hackari:hackari_dev@postgres:5432/hackari
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-jwt-secret-change-in-production
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
      AWS_ENDPOINT: http://minio:9000
      AWS_BUCKET_NAME: hackari
      RUST_LOG: debug
      FRONTEND_URL: http://localhost:5173
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      redis:
        condition: service_started

  frontend:
    user: "${UID}:${GID}"
    image: node:20-alpine
    container_name: hackari_frontend
    working_dir: /app
    command: sh -c "npm install && npm run build && npx vite preview --host --port 5173"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://111.88.149.106:3001}
    ports:
      - "5173:5173"
    volumes:
      - ./:/app
      - node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  node_modules:
  postgres_data:
  pgadmin_data:
  minio_data:
  redis_data:
